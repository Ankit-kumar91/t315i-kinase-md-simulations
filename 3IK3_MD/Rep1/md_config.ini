# ══════════════════════════════════════════════════════════════════════════════
#  md_config.ini  —  Settings for the MD analysis pipeline
#
#  Open with any text editor:
#    Windows  ->  Notepad
#    Mac      ->  TextEdit  (go to Format > Make Plain Text first)
#    Linux    ->  gedit, nano, kate ...
#
#  Rule: change only the value AFTER the = sign.
#        Lines starting with # are notes the script ignores.
#
#  Everything below is OPTIONAL.
#  The script runs without any changes to this file.
# ══════════════════════════════════════════════════════════════════════════════


[system]
# Short label shown in plot titles and the text report
sim_label   = simulation

# GROMACS command  (gmx on most computers; some HPC systems use gmx_mpi)
gromacs_cmd = gmx

# Ligand residue name — the script detects this automatically from the .gro file.
# Only uncomment and set this if the script picks the wrong molecule.
# lig_resname = LIG

# Gatekeeper residue number — set to the key contact residue you want to track.
# 0 = skip gatekeeper analysis.  ABL1 gatekeeper = 315.
gatekeeper_res = 315


[paths]
# sim_dir = .  means "look for GROMACS files in THIS same folder as the script"
# Only change sim_dir if your GROMACS files are in a DIFFERENT folder.
sim_dir = .
out_dir = results
tpr = md_0.2.tpr
xtc = md_0.2.xtc
edr = md_0.2.edr
gro = md_0.2.gro
ndx = index.ndx


[figure]
# Image quality:  72 = screen preview   150 = standard   300 = journal/print
dpi = 150
# Figure size in inches
width  = 10
height = 4
# Colours — use a colour name (red, blue) or a hex code (#d7191c)
ligand_color     = #d7191c
backbone_color   = #2c7bb6
hbond_color      = #1a9641
gatekeeper_color = #fd8d3c
rmsf_color       = #756bb1
energy_color     = #636363
# Dot size for the gatekeeper marker on the RMSF plot  (40 small, 60 default, 120 large)
ligand_marker_size = 60
# Text size multiplier  (1.0 = normal,  1.3 = larger for presentations)
font_scale = 1.1


[analysis]
contact_cutoff_A     = 4.5
hbond_distance_A     = 3.5
hbond_angle_deg      = 120
min_plot_contact_pct = 10

# Groups are auto-detected from index.ndx.
# Only add [groups] below if the startup table shows the WRONG group number.
# [groups]
# LIG         = 14
# Protein_LIG = 22
