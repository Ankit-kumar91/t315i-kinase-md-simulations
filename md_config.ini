# =============================================================================
#  md_config.ini  —  Configuration file for md_analysis.py
#
#  HOW TO USE:
#  1. Change sim_dir (below) to the folder containing your GROMACS files.
#  2. Run:  python md_analysis.py --config /path/to/this/md_config.ini
#
#  Everything below [paths] is optional — defaults work for most simulations.
# =============================================================================


[paths]

# *** CHANGE THIS to the folder that contains your .tpr .xtc .edr .gro .ndx files ***
sim_dir = /Users/ankitkumar/Documents/Projects/abl1-t315i-resistance-md/T315I_MD/Rep3/
# Folder where results (plots + tables) will be saved. Created automatically.
out_dir = /Users/ankitkumar/Documents/Projects/abl1-t315i-resistance-md/T315I_MD/Rep3/results

# File names are auto-detected from sim_dir. Uncomment only if detection fails.
# tpr = md.tpr
# xtc = md.xtc
# edr = md.edr
# gro = md.gro
# ndx = index.ndx


# =============================================================================
# OPTIONAL SETTINGS — change only if needed
# =============================================================================

[system]

# Label shown in plot titles and the report
sim_label = T315I

# GROMACS command (gmx on most systems; HPC clusters may use gmx_mpi)
gromacs_cmd = gmx

# Ligand residue name — auto-detected if left commented out.
# Uncomment and set this only if the script picks the wrong molecule.
# lig_resname = LIG

# Residue number of the gatekeeper to track (ABL1 = 315, 0 = skip)
gatekeeper_res = 315


[analysis]

# Time unit for plot x-axes: ps  or  ns
time_unit = ns

# Distance cutoff (Å) for counting binding-pocket contacts
contact_cutoff_A = 4.5

# H-bond geometry criteria
hbond_distance_A = 3.5
hbond_angle_deg  = 120

# Residues with contact occupancy below this % are hidden from the bar chart
min_plot_contact_pct = 10


[figure]

# Image resolution: 72 = screen preview   150 = standard   300 = journal/print
dpi = 150

# Figure size in inches
width  = 10
height = 4

# Font sizes in points
title_fontsize = 13
label_fontsize = 11
font_scale     = 1.1

# Colours — use a colour name (red, blue) or a hex code (#rrggbb)
backbone_color   = #2c7bb6
ligand_color     = #d7191c
hbond_color      = #1a9641
gatekeeper_color = #fd8d3c
rmsf_color       = #756bb1
energy_color     = #636363

# Gatekeeper/ligand marker size on the RMSF plot (pt²)  40=small  60=default  120=large
ligand_marker_size = 60


# [groups]
# Override GROMACS index group numbers here only if the startup log shows
# "NOT FOUND" for a group you need.
# LIG         = 14
# Protein_LIG = 22
